<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #f8f8f8;
            box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            padding: 10px;
            box-sizing: border-box;
        }
        .content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .text {
            flex-grow: 1;
            padding-left: 40px;
        }
        .image {
            width: 130px;
            height: 100px;
            border-radius: 25px;
            overflow: hidden;
            
        }
        .image img {
            width: 100%;
            height: 100%;
        }
        .buttons {
            display: flex;
            justify-content: space-between;
        }
        .button {
            padding: 10px 20px;
            border: none;
            background-color: #007bff;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            flex-grow: 1;
            margin: 0 5px;
        }
        .button.dismiss {
            background-color: #6c757d;
        }
    </style>
</head>
<body>

<div class="footer">
    <div class="content">
        <div class="text">Aquí va el texto informativo.</div>
        <div class="image">
            <img src="descarga.png" alt="Imagen">
        </div>
    </div>
    <div class="buttons">
        <button class="button action" onclick="window.location.href='https://www.bgeneral.com/'">Ir</button>
        <button class="button dismiss" onclick="dismiss()">Cerrar</button>
    </div>
</div>

<script>
    function dismiss() {
        // Código para ocultar o cerrar el footer
        document.querySelector('.footer').style.display = 'none';
    }
</script>

</body>
</html>
